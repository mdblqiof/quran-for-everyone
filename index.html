<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran For Everyone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Amiri&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:Poppins;
  background:#020617;
  color:#e2e8f0;
}

header {
  background:linear-gradient(135deg,#16a34a,#22c55e);
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:15px;
}

.ayah {
  background:#0f172a;
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.arabic {
  font-family:'Amiri';
  font-size:30px;
  text-align:right;
  line-height:2;
  color:#f8fafc;
}

.english {
  margin-top:10px;
  color:#38bdf8;
}

.urdu {
  margin-top:5px;
  color:#4ade80;
  direction:rtl;
}

audio {
  width:100%;
  margin-top:10px;
}

.loader {
  text-align:center;
  margin-top:30px;
}

</style>
</head>

<body>

<header>🌙 Quran For Everyone</header>

<div class="container">

<h2>Select Surah</h2>
<select id="surah"></select>

<div id="content"></div>

</div>

<script>

// Load Surah List
fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {
  let dropdown = document.getElementById("surah");
  data.data.forEach(s => {
    dropdown.innerHTML += `<option value="${s.number}">${s.number}. ${s.englishName}</option>`;
  });

  // AUTO LOAD FIRST SURAH
  loadSurah(1);
});

// On change auto load
document.getElementById("surah").addEventListener("change", function(){
  loadSurah(this.value);
});

function loadSurah(num){

  document.getElementById("content").innerHTML = `<div class="loader">Loading...</div>`;

  fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,en.asad,ur.jalandhry`)
  .then(res => res.json())
  .then(data => {

    let arabic = data.data[0].ayahs;
    let english = data.data[1].ayahs;
    let urdu = data.data[2].ayahs;

    let html = "";

    for(let i=0;i<arabic.length;i++){
      html += `
        <div class="ayah">
          <div class="arabic">${arabic[i].text}</div>
          <div class="english">${english[i].text}</div>
          <div class="urdu">${urdu[i].text}</div>

          <audio controls preload="none"
          src="https://cdn.islamic.network/quran/audio/128/ar.alafasy/${arabic[i].number}.mp3"></audio>
        </div>
      `;
    }

    document.getElementById("content").innerHTML = html;

  });
}

</script>

</body>
</html>
