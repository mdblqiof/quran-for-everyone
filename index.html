<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran For Everyone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Amiri&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:Poppins;
  background:#020617;
  color:white;
}

header {
  background:linear-gradient(135deg,#22c55e,#16a34a);
  padding:20px;
  text-align:center;
  font-size:26px;
}

/* CARD */
.ayah {
  background:#0f172a;
  margin:20px;
  padding:20px;
  border-radius:15px;
  transition:0.5s;
}

/* ACTIVE SLIDE */
.active {
  background:#065f46;
  box-shadow:0 0 20px #22c55e;
}

/* TEXT */
.arabic {
  font-family:'Amiri';
  font-size:30px;
  text-align:right;
}

.english { color:#38bdf8; }
.urdu { color:#4ade80; direction:rtl; }

.controls {
  text-align:center;
  margin:20px;
}

button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#22c55e;
  color:white;
}

</style>
</head>

<body>

<header>🌙 Quran For Everyone</header>

<div class="controls">
  <button onclick="startAuto()">▶ Auto Play</button>
  <button onclick="stopAuto()">⏹ Stop</button>
</div>

<div id="content"></div>

<script>

let ayahs = [];
let current = 0;
let playing = false;

// Load Surah 1 default
loadSurah(1);

function loadSurah(num){
  fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,en.asad,ur.jalandhry`)
  .then(res => res.json())
  .then(data => {

    ayahs = data.data[0].ayahs;
    let english = data.data[1].ayahs;
    let urdu = data.data[2].ayahs;

    let html = "";

    for(let i=0;i<ayahs.length;i++){
      html += `
        <div class="ayah" id="ayah-${i}">
          <div class="arabic">${ayahs[i].text}</div>
          <div class="english">${english[i].text}</div>
          <div class="urdu">${urdu[i].text}</div>
        </div>
      `;
    }

    document.getElementById("content").innerHTML = html;

  });
}

// AUTO PLAY
function startAuto(){
  playing = true;
  playAyah();
}

function stopAuto(){
  playing = false;
}

function playAyah(){

  if(!playing || current >= ayahs.length) return;

  // highlight
  document.querySelectorAll(".ayah").forEach(a => a.classList.remove("active"));
  document.getElementById(`ayah-${current}`).classList.add("active");

  // scroll
  document.getElementById(`ayah-${current}`).scrollIntoView({behavior:"smooth", block:"center"});

  // audio
  let audio = new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${ayahs[current].number}.mp3`);
  audio.play();

  audio.onended = () => {
    current++;
    playAyah();
  };

}

</script>

</body>
</html>
