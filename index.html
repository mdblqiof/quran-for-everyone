<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran For Everyone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Amiri&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:Poppins;
  background:#0b0f19;
  color:white;
}

/* NAV */
.nav {
  padding:15px;
  text-align:center;
  background:#111827;
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search-box {
  max-width:700px;
  margin:20px auto;
  background:#1f2937;
  padding:12px;
  border-radius:50px;
}

.search-box input {
  width:95%;
  padding:10px;
  border:none;
  background:transparent;
  color:white;
  outline:none;
}

/* CARDS */
.cards {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
}

.card {
  background:#1f2937;
  padding:20px;
  border-radius:15px;
  width:250px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* BUTTON */
.btn {
  display:block;
  margin:20px auto;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* AYAH */
.ayah {
  background:#111827;
  margin:15px;
  padding:20px;
  border-radius:12px;
}

.arabic {
  font-family:'Amiri';
  font-size:30px;
  text-align:right;
  line-height:2;
}

.english {
  color:#38bdf8;
  margin-top:10px;
}

.urdu {
  color:#4ade80;
  direction:rtl;
}

audio {
  width:100%;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="nav">🌙 Quran For Everyone</div>

<div class="search-box">
  <input type="text" placeholder="Search Surah..." id="search">
</div>

<div class="cards" id="cards"></div>

<button class="btn" onclick="startAuto()">▶ Auto Play</button>

<div id="content"></div>

<script>

let currentAyah = 0;
let totalAyahs = 0;

// LOAD SURAHS
fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {

  let html = "";
  data.data.forEach(s => {
    html += `
      <div class="card" onclick="loadSurah(${s.number})">
        <h3>${s.englishName}</h3>
        <p>${s.name}</p>
        <small>${s.numberOfAyahs} Ayahs</small>
      </div>
    `;
  });

  document.getElementById("cards").innerHTML = html;
});

// LOAD SURAH
function loadSurah(num){

  document.getElementById("content").innerHTML = "Loading...";

  fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,en.asad,ur.jalandhry`)
  .then(res => res.json())
  .then(data => {

    let arabic = data.data[0].ayahs;
    let english = data.data[1].ayahs;
    let urdu = data.data[2].ayahs;

    currentAyah = 0;
    totalAyahs = arabic.length;

    let html = "";

    for(let i=0;i<arabic.length;i++){
      html += `
        <div class="ayah" id="ayah-${i}">
          <div class="arabic">${arabic[i].text}</div>
          <div class="english">${english[i].text}</div>
          <div class="urdu">${urdu[i].text}</div>
          <audio id="audio-${i}" src="https://cdn.islamic.network/quran/audio/128/ar.alafasy/${arabic[i].number}.mp3"></audio>
        </div>
      `;
    }

    document.getElementById("content").innerHTML = html;

  });
}

// AUTO PLAY
function startAuto(){
  playNext();
}

function playNext(){

  if(currentAyah >= totalAyahs) return;

  let audio = document.getElementById(`audio-${currentAyah}`);
  let ayahDiv = document.getElementById(`ayah-${currentAyah}`);

  ayahDiv.scrollIntoView({behavior:"smooth"});
  audio.play();

  audio.onended = () => {
    currentAyah++;
    playNext();
  };

}

// SEARCH
document.getElementById("search").addEventListener("input", function(){

  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    if(card.innerText.toLowerCase().includes(value)){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });

});

</script>

</body>
</html>
