<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran For Everyone</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Amiri&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:#0f172a;
  color:white;
  text-align:center;
}

header {
  background:linear-gradient(135deg,#22c55e,#4ade80);
  padding:20px;
  font-size:28px;
  font-weight:bold;
}

.container {
  padding:20px;
}

select, button {
  padding:10px;
  margin:10px;
  border:none;
  border-radius:8px;
}

button {
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.arabic {
  font-family:'Amiri';
  font-size:28px;
  margin-top:20px;
}

.translation {
  color:#a7f3d0;
  margin:10px;
}

audio {
  margin-top:15px;
}
</style>
</head>

<body>

<header>🌙 Quran For Everyone</header>

<div class="container">

<h2>Select Surah</h2>

<select id="surah"></select>
<button onclick="loadSurah()">Load</button>

<div id="content"></div>

</div>

<script>

// Load Surah List
fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {
  let dropdown = document.getElementById("surah");
  data.data.forEach(s => {
    dropdown.innerHTML += `<option value="${s.number}">${s.number}. ${s.englishName}</option>`;
  });
});

function loadSurah() {
  let num = document.getElementById("surah").value;

  fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,en.asad,ur.jalandhry`)
  .then(res => res.json())
  .then(data => {

    let arabic = data.data[0].ayahs;
    let english = data.data[1].ayahs;
    let urdu = data.data[2].ayahs;

    let html = "";

    for(let i=0;i<arabic.length;i++){
      html += `
        <div class="ayah">
          <p class="arabic">${arabic[i].text}</p>
          <p class="translation">${english[i].text}</p>
          <p class="translation">${urdu[i].text}</p>

          <audio controls src="https://cdn.islamic.network/quran/audio/128/ar.alafasy/${arabic[i].number}.mp3"></audio>
        </div>
        <hr>
      `;
    }

    document.getElementById("content").innerHTML = html;

  });
}

</script>

</body>
</html>
