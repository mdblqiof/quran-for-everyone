<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quran For Everyone</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #111;
            color: white;
        }
        header {
            background: green;
            padding: 20px;
        }
        select, button {
            padding: 10px;
            margin: 10px;
        }
        .ayah {
            margin: 20px;
            padding: 10px;
            background: #222;
        }
    </style>
</head>
<body>

<header>
    <h1>Quran For Everyone 🌍</h1>
</header>

<h2>Select Surah</h2>

<select id="surahSelect"></select>
<button onclick="loadSurah()">Load</button>

<div id="quran"></div>

<script>
let select = document.getElementById("surahSelect");

for (let i = 1; i <= 114; i++) {
    let option = document.createElement("option");
    option.value = i;
    option.text = "Surah " + i;
    select.appendChild(option);
}

function loadSurah() {
    let surah = select.value;
    fetch("https://api.alquran.cloud/v1/surah/" + surah + "/en.asad")
    .then(res => res.json())
    .then(data => {
        let container = document.getElementById("quran");
        container.innerHTML = "";
        data.data.ayahs.forEach(a => {
            container.innerHTML += `<div class='ayah'>
                <p>${a.text}</p>
            </div>`;
        });
    });
}
</script>

</body>
</html>
