<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran For Everyone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Amiri&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:Poppins;
  background:#0b0f19;
  color:white;
}

/* NAVBAR */
.nav {
  padding:15px;
  text-align:center;
  background:#111827;
  font-size:20px;
  font-weight:bold;
}

/* SEARCH BAR */
.search-box {
  max-width:700px;
  margin:20px auto;
  background:#1f2937;
  padding:10px;
  border-radius:50px;
}

.search-box input {
  width:90%;
  padding:10px;
  border:none;
  background:transparent;
  color:white;
  outline:none;
}

/* CARDS */
.cards {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
}

.card {
  background:#1f2937;
  padding:20px;
  border-radius:15px;
  width:300px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* AYAH */
.ayah {
  background:#111827;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

.arabic {
  font-family:'Amiri';
  font-size:28px;
  text-align:right;
}

.english {
  color:#38bdf8;
}

.urdu {
  color:#4ade80;
  direction:rtl;
}

audio {
  width:100%;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="nav">🌙 Quran For Everyone</div>

<div class="search-box">
  <input type="text" placeholder="Search Surah (e.g. Baqarah)" id="search">
</div>

<div class="cards" id="cards"></div>

<div id="content"></div>

<script>

// Load Surahs
fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {

  let html = "";
  data.data.forEach(s => {
    html += `
      <div class="card" onclick="loadSurah(${s.number})">
        <h3>${s.englishName}</h3>
        <p>${s.name}</p>
        <small>${s.numberOfAyahs} Ayahs</small>
      </div>
    `;
  });

  document.getElementById("cards").innerHTML = html;
});

// Load Surah
function loadSurah(num){

  document.getElementById("content").innerHTML = "Loading...";

  fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,en.asad,ur.jalandhry`)
  .then(res => res.json())
  .then(data => {

    let arabic = data.data[0].ayahs;
    let english = data.data[1].ayahs;
    let urdu = data.data[2].ayahs;

    let html = "<h2 style='text-align:center'>Surah</h2>";

    for(let i=0;i<arabic.length;i++){
      html += `
        <div class="ayah">
          <div class="arabic">${arabic[i].text}</div>
          <div class="english">${english[i].text}</div>
          <div class="urdu">${urdu[i].text}</div>
          <audio controls src="https://cdn.islamic.network/quran/audio/128/ar.alafasy/${arabic[i].number}.mp3"></audio>
        </div>
      `;
    }

    document.getElementById("content").innerHTML = html;

  });
}

// SEARCH
document.getElementById("search").addEventListener("input", function(){

  let value = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    if(card.innerText.toLowerCase().includes(value)){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });

});

</script>

</body>
</html>
